name: iOS Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios-simulator:
    runs-on: macos-latest
    env:
      IOS_DEVICE_NAME: "iPhone 16 Pro"
      IOS_OS_VERSION: "18.5"
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Resolve Swift Packages
        working-directory: ios/GinxSeedSwiftUI
        run: |
          xcodebuild \
            -project GinxSeedSwiftUI.xcodeproj \
            -scheme GinxSeedSwiftUI \
            -resolvePackageDependencies

      - name: Build For iOS Simulator
        working-directory: ios/GinxSeedSwiftUI
        run: |
          set -o pipefail
          xcodebuild \
            -project GinxSeedSwiftUI.xcodeproj \
            -scheme GinxSeedSwiftUI \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=$IOS_DEVICE_NAME,OS=$IOS_OS_VERSION" \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | xcbeautify --renderer github-actions
